name: Update Exchange Rates

on:
  schedule:
    - cron: '*/30 7-22 * * 1-5'
  workflow_dispatch:
  push:
    paths:
      - 'xfee-rates.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance

      - name: Fetch rates
        run: python3 update_rates.py

      - name: Commit & push
        run: |
          git config user.name "rates-bot"
          git config user.email "bot@rates.local"
          git add rates.json
          if ! git diff --staged --quiet; then
            git commit -m "🔄 rates update $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          else
            echo "No changes"
          fi
