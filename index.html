<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Курсы валют — Дашборд</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d2e; --border:#2a2d3e; --text:#e0e0e0; --accent:#00d4aa; --blue:#7c8aff; --gold:#ffa502; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; padding:20px; max-width:1100px; margin:0 auto; }
  h1 { font-size:1.6rem; margin-bottom:5px; }
  .subtitle { color:#888; font-size:0.85rem; margin-bottom:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .card h2 { font-size:1.1rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.cbr { background:var(--blue); }
  .dot.xe { background:var(--accent); }
  .dot.xfee { background:var(--gold); }
  .rate-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
  .rate-row:last-child { border-bottom:none; }
  .pair { font-weight:600; font-size:1.05rem; }
  .rate { font-size:1.3rem; font-weight:700; color:var(--accent); }
  .rate-label { font-size:0.7rem; color:#888; }
  .loading { opacity:0.5; }
  .calc { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .calc h2 { font-size:1.1rem; margin-bottom:12px; }
  .calc-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .calc-row input, .calc-row select { background:#252840; border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-size:1rem; }
  .calc-row input { width:160px; }
  .calc-row select { width:100px; }
  .rate-select { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .rate-select button { background:#252840; border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
  .rate-select button.active { background:var(--blue); border-color:var(--blue); color:#fff; }
  .calc-result { margin-top:12px; padding:14px; background:#252840; border-radius:8px; }
  .calc-result .big { font-size:1.5rem; font-weight:700; color:var(--accent); }
  .calc-result .detail { font-size:0.8rem; color:#888; margin-top:4px; }
  .footer { text-align:center; color:#444; font-size:0.75rem; margin-top:20px; }
  .badge { font-size:0.65rem; padding:2px 6px; border-radius:4px; margin-left:6px; }
  .badge.live { background:#1a3a2a; color:var(--accent); }
  .badge.stale { background:#3a2a1a; color:var(--gold); }
</style>
</head>
<body>
<h1>💰 Курсы валют</h1>
<p class="subtitle" id="global-updated">Загрузка...</p>

<div class="grid">
  <div class="card">
    <h2><span class="dot cbr"></span> ЦБ РФ <span class="badge live" id="cbr-badge">live</span></h2>
    <div class="rate-label" style="margin-bottom:6px">₽ за единицу</div>
    <div id="cbr-rates"><span class="loading">Загрузка...</span></div>
  </div>
  <div class="card">
    <h2><span class="dot xe"></span> XE / Рынок <span class="badge live" id="xe-badge">live</span></h2>
    <div class="rate-label" style="margin-bottom:6px">USD за 1 единицу</div>
    <div id="xe-rates"><span class="loading">Загрузка...</span></div>
  </div>
  <div class="card">
    <h2><span class="dot xfee"></span> XFeepay <span class="badge stale" id="xfee-badge">ждём</span></h2>
    <div id="xfee-rates"><span class="loading">Загрузка...</span></div>
  </div>
</div>

<div class="calc">
  <h2>🧮 Калькулятор сделки</h2>
  <div class="rate-select" id="rate-buttons">
    <button data-source="cbr" class="active">ЦБ РФ</button>
    <button data-source="xe">XE / Рынок</button>
    <button data-source="xfee">XFeepay</button>
  </div>
  <div class="calc-row">
    <input type="number" id="calc-amount" placeholder="Сумма" value="10000" step="any">
    <select id="calc-currency">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="CNY">CNY</option>
      <option value="TRY">TRY</option>
    </select>
    <span style="color:#888;font-weight:600">→ RUB</span>
  </div>
  <div class="calc-result" id="calc-result">
    <div class="big">—</div>
    <div class="detail">Выберите валюту и сумму</div>
  </div>
</div>

<div class="footer">
  ЦБ РФ • <a href="https://open.er-api.com" target="_blank">Open ER API</a> • автообновление GitHub Action
</div>

<script>
let rates = { cbr:{}, xe:{}, xfee:{} };
let activeSource = 'cbr';
const CURRENCIES = ['USD','EUR','CNY','TRY'];

async function loadRates() {
  try {
    const resp = await fetch('rates.json?t='+Date.now());
    const data = await resp.json();
    rates.cbr = data.cbr || {};
    rates.xe = data.xe || {};
    rates.xfee = data.xfee || {};

    renderCBR();
    renderXE();
    renderXFee();

    if (data.updated) {
      const d = new Date(data.updated);
      document.getElementById('global-updated').textContent = 
        'Обновлено: '+d.toLocaleString('ru-RU',{timeZone:'Europe/Moscow'})+' МСК • авто 5 мин';
    }
    const age = data.updated ? (Date.now()-new Date(data.updated).getTime())/60000 : 999;
    const fresh = age < 60;
    ['cbr','xe'].forEach(s => {
      const b = document.getElementById(s+'-badge');
      b.textContent = fresh ? 'live' : Math.round(age)+'м';
      b.className = 'badge '+(fresh?'live':'stale');
    });
    updateCalc();
  } catch(e) {
    document.getElementById('global-updated').textContent = 'Ошибка: '+e.message;
  }
}

function renderCBR() {
  const el = document.getElementById('cbr-rates');
  let html = '';
  for (const c of CURRENCIES) {
    const r = rates.cbr[c];
    html += `<div class="rate-row"><span class="pair">${c}</span>
      <span class="rate">${r ? r.toFixed(4)+' ₽' : '<span style="color:#888">—</span>'}</span></div>`;
  }
  el.innerHTML = html;
}

function renderXE() {
  const el = document.getElementById('xe-rates');
  let html = '';
  for (const c of ['EUR','CNY','TRY']) {
    const r = rates.xe[c];
    html += `<div class="rate-row"><span class="pair">${c}</span>
      <span class="rate">${r ? '1 '+c+' = '+r.toFixed(4)+' USD' : '<span style="color:#888">—</span>'}</span></div>`;
  }
  el.innerHTML = html;
}

function renderXFee() {
  const el = document.getElementById('xfee-rates');
  let html = '';
  for (const c of CURRENCIES) {
    html += `<div class="rate-row"><span class="pair">${c}</span>
      <span class="rate" style="color:#888">—</span></div>`;
  }
  el.innerHTML = html;
}

function updateCalc() {
  const amount = parseFloat(document.getElementById('calc-amount').value) || 0;
  const currency = document.getElementById('calc-currency').value;
  const el = document.getElementById('calc-result');
  const labels = {cbr:'ЦБ РФ', xe:'XE / Рынок', xfee:'XFeepay'};

  if (activeSource === 'cbr') {
    const r = rates.cbr[currency];
    if (!r) { el.innerHTML='<div class="big">—</div><div class="detail">Нет данных</div>'; return; }
    const total = amount * r;
    el.innerHTML = `<div class="big">${total.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})} ₽</div>
      <div class="detail">${amount.toLocaleString('ru-RU')} ${currency} × ${r.toFixed(4)} ₽/ед (${labels[activeSource]})</div>`;
    return;
  }

  // XE: rates are USD per unit. Convert to RUB via CBR's USD/RUB
  if (activeSource === 'xe') {
    const usdPerUnit = rates.xe[currency];
    const usdRub = rates.cbr['USD'];
    if (!usdPerUnit || !usdRub) { el.innerHTML='<div class="big">—</div><div class="detail">Нет данных</div>'; return; }
    const total = amount * usdPerUnit * usdRub;
    el.innerHTML = `<div class="big">${total.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})} ₽</div>
      <div class="detail">${amount.toLocaleString('ru-RU')} ${currency} × ${usdPerUnit.toFixed(4)} USD/ед × ${usdRub.toFixed(4)} ₽/USD (${labels[activeSource]})</div>`;
    return;
  }

  el.innerHTML='<div class="big">—</div><div class="detail">XFeepay — ждём данные</div>';
}

document.querySelectorAll('#rate-buttons button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#rate-buttons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSource = btn.dataset.source;
    updateCalc();
  });
});
document.getElementById('calc-amount').addEventListener('input', updateCalc);
document.getElementById('calc-currency').addEventListener('change', updateCalc);

loadRates();
setInterval(loadRates, 5*60*1000);
</script>
</body>
</html>
